<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Knowledge Graph - Attack Surface Analysis</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --surface: #16161d;
      --surface-raised: #1e1e28;
      --border: #2a2a35;
      --border-mid: #3a3a45;
      --text: #e4e4e7;
      --text-secondary: #a1a1aa;
      --text-dim: #71717a;
      --primary: #a020f0;
      --primary-hover: #8b1ad1;
      --danger: #ef4444;
      --warning: #f59e0b;
      --success: #10b981;
      --info: #3b82f6;
      --neon-purple: #a020f0;
      --neon-blue: #6366f1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(22, 22, 29, 0.8);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      background: var(--neon-purple);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-dim);
      font-family: 'Courier New', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .toggle-btn {
      background: var(--surface-raised);
      border: 1px solid var(--border-mid);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .toggle-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(160, 32, 240, 0.3);
    }

    .toggle-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 0 20px rgba(160, 32, 240, 0.4);
    }

    .legend {
      position: fixed;
      top: 100px;
      right: 32px;
      background: rgba(22, 22, 29, 0.9);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      width: 280px;
      z-index: 90;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .legend-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .legend-color {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      border: 2px solid;
    }

    .legend-color.critical { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); }
    .legend-color.high { background: rgba(245, 158, 11, 0.2); border-color: var(--warning); }
    .legend-color.medium { background: rgba(59, 130, 246, 0.2); border-color: var(--info); }
    .legend-color.low { background: rgba(16, 185, 129, 0.2); border-color: var(--success); }
    .legend-color.safe { background: rgba(16, 185, 129, 0.3); border-color: var(--success); }

    #graph-container {
      position: fixed;
      top: 80px;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, rgba(160, 32, 240, 0.05) 0%, transparent 70%);
    }

    .node {
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .node circle {
      stroke-width: 2px;
      filter: drop-shadow(0 0 8px currentColor);
    }

    .node:hover circle {
      filter: drop-shadow(0 0 16px currentColor);
      stroke-width: 3px;
    }

    .node text {
      font-size: 11px;
      font-weight: 600;
      pointer-events: none;
      text-anchor: middle;
      fill: var(--text);
      text-shadow: 0 0 4px var(--bg), 0 0 8px var(--bg);
    }

    .link {
      stroke: var(--border-mid);
      stroke-width: 2px;
      stroke-opacity: 0.6;
      fill: none;
    }

    .link.active {
      stroke: var(--primary);
      stroke-width: 3px;
      stroke-opacity: 1;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { stroke-opacity: 0.6; }
      50% { stroke-opacity: 1; }
    }

    .link-label {
      font-size: 10px;
      fill: var(--text-dim);
      text-anchor: middle;
      pointer-events: none;
      font-family: 'Courier New', monospace;
    }

    .tooltip {
      position: fixed;
      background: rgba(22, 22, 29, 0.95);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 1000;
      max-width: 320px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .tooltip-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .tooltip-risk {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tooltip-risk.critical { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .tooltip-risk.high { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .tooltip-risk.medium { background: rgba(59, 130, 246, 0.2); color: var(--info); }
    .tooltip-risk.low { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .tooltip-risk.safe { background: rgba(16, 185, 129, 0.3); color: var(--success); }

    .detail-panel {
      position: fixed;
      top: 120px;
      left: 32px;
      right: 340px;
      background: rgba(22, 22, 29, 0.9);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
      z-index: 95;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.3s ease;
    }

    .detail-panel.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .detail-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--primary);
    }

    .detail-content {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    .detail-content ul {
      list-style: none;
      padding-left: 0;
      margin-top: 8px;
    }

    .detail-content li {
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-content li:last-child {
      border-bottom: none;
    }

    .close-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--surface-raised);
      border: 1px solid var(--border-mid);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: inherit;
      z-index: 100;
    }

    .close-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(160, 32, 240, 0.3);
    }

    .close-btn:focus {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    .stats-bar {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 280px;
      background: rgba(22, 22, 29, 0.9);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      z-index: 90;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .stat-label {
      color: var(--text-secondary);
    }

    .stat-value {
      font-weight: 600;
      font-size: 14px;
    }

    .stat-value.critical { color: var(--danger); }
    .stat-value.high { color: var(--warning); }
    .stat-value.medium { color: var(--info); }
    .stat-value.low { color: var(--success); }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--surface);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-mid);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="controls">
      <button class="toggle-btn active" id="cloud-btn">☁️ Cloud AI</button>
      <button class="toggle-btn" id="local-btn">🖥️ Local LLM</button>
    </div>
  </div>

  <div class="legend">
    <div class="legend-title">Risk Levels</div>
    <div class="legend-item">
      <div class="legend-color critical"></div>
      <span>Critical - Immediate action required</span>
    </div>
    <div class="legend-item">
      <div class="legend-color high"></div>
      <span>High - Significant vulnerability</span>
    </div>
    <div class="legend-item">
      <div class="legend-color medium"></div>
      <span>Medium - Moderate risk</span>
    </div>
    <div class="legend-item">
      <div class="legend-color low"></div>
      <span>Low - Minor concern</span>
    </div>
    <div class="legend-item">
      <div class="legend-color safe"></div>
      <span>Safe - No significant risk</span>
    </div>
  </div>

  <div class="stats-bar">
    <div class="legend-title">Vulnerability Count</div>
    <div class="stat-item">
      <span class="stat-label">Critical</span>
      <span class="stat-value critical" id="stat-critical">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">High</span>
      <span class="stat-value high" id="stat-high">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Medium</span>
      <span class="stat-value medium" id="stat-medium">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Low</span>
      <span class="stat-value low" id="stat-low">0</span>
    </div>
  </div>

  <div id="graph-container"></div>
  <div class="tooltip" id="tooltip"></div>
  <div class="detail-panel" id="detail-panel"></div>

  <script>
    // Data structures for both architectures
    const cloudData = {
      nodes: [
        { id: 'user', label: 'User Input', type: 'entry', risk: 'critical', desc: 'Code editor, task notes, and prompts entered by users' },
        { id: 'browser', label: 'Browser', type: 'processing', risk: 'medium', desc: 'Client-side JavaScript execution environment' },
        { id: 'localstorage', label: 'localStorage', type: 'storage', risk: 'high', desc: 'Unencrypted browser storage accessible via DevTools' },
        { id: 'monaco', label: 'Monaco Editor', type: 'processing', risk: 'medium', desc: 'Code editor component with syntax highlighting' },
        { id: 'eval', label: 'eval()/Function()', type: 'processing', risk: 'critical', desc: 'Dynamic code execution - major XSS vector' },
        { id: 'api-key', label: 'API Key', type: 'credential', risk: 'critical', desc: 'Anthropic API key exposed in client code' },
        { id: 'https', label: 'HTTPS', type: 'network', risk: 'medium', desc: 'Encrypted network transport' },
        { id: 'anthropic', label: 'Anthropic API', type: 'external', risk: 'high', desc: 'Third-party cloud service receives all prompts and code' },
        { id: 'xss', label: 'XSS Attack', type: 'threat', risk: 'critical', desc: 'Cross-site scripting via unsanitized user input' },
        { id: 'mitm', label: 'MITM Attack', type: 'threat', risk: 'medium', desc: 'Man-in-the-middle network interception' },
        { id: 'data-leak', label: 'Data Exfiltration', type: 'threat', risk: 'critical', desc: 'User code and data sent to third party' },
      ],
      links: [
        { source: 'user', target: 'browser', label: 'input', active: true },
        { source: 'browser', target: 'monaco', label: 'render', active: true },
        { source: 'browser', target: 'eval', label: 'execute', active: true },
        { source: 'browser', target: 'localstorage', label: 'store', active: true },
        { source: 'browser', target: 'https', label: 'request', active: true },
        { source: 'api-key', target: 'https', label: 'auth', active: true },
        { source: 'https', target: 'anthropic', label: 'transmit', active: true },
        { source: 'user', target: 'xss', label: 'exploit', active: false },
        { source: 'https', target: 'mitm', label: 'intercept', active: false },
        { source: 'anthropic', target: 'data-leak', label: 'exfiltrate', active: true },
        { source: 'localstorage', target: 'xss', label: 'access', active: false },
      ]
    };

    const localData = {
      nodes: [
        { id: 'user', label: 'User Input', type: 'entry', risk: 'medium', desc: 'Code editor, task notes, and prompts entered by users' },
        { id: 'browser', label: 'Browser', type: 'processing', risk: 'low', desc: 'Client-side JavaScript execution environment' },
        { id: 'localstorage', label: 'localStorage', type: 'storage', risk: 'medium', desc: 'Unencrypted browser storage accessible via DevTools' },
        { id: 'monaco', label: 'Monaco Editor', type: 'processing', risk: 'low', desc: 'Code editor component with syntax highlighting' },
        { id: 'eval', label: 'eval()/Function()', type: 'processing', risk: 'medium', desc: 'Dynamic code execution - sandboxed locally' },
        { id: 'localhost', label: 'localhost:11434', type: 'network', risk: 'low', desc: 'Local network connection - no external exposure' },
        { id: 'ollama', label: 'Ollama/LM Studio', type: 'local', risk: 'safe', desc: 'Local LLM server running on Mac Mini' },
        { id: 'model', label: 'Local Model', type: 'local', risk: 'safe', desc: 'AI model running entirely on local hardware' },
        { id: 'xss', label: 'XSS Attack', type: 'threat', risk: 'medium', desc: 'Cross-site scripting via unsanitized user input' },
        { id: 'firewall', label: 'Firewall', type: 'protection', risk: 'safe', desc: 'Mac Mini firewall blocks external access' },
      ],
      links: [
        { source: 'user', target: 'browser', label: 'input', active: true },
        { source: 'browser', target: 'monaco', label: 'render', active: true },
        { source: 'browser', target: 'eval', label: 'execute', active: true },
        { source: 'browser', target: 'localstorage', label: 'store', active: true },
        { source: 'browser', target: 'localhost', label: 'request', active: true },
        { source: 'localhost', target: 'ollama', label: 'process', active: true },
        { source: 'ollama', target: 'model', label: 'inference', active: true },
        { source: 'user', target: 'xss', label: 'exploit', active: false },
        { source: 'localstorage', target: 'xss', label: 'access', active: false },
        { source: 'firewall', target: 'ollama', label: 'protect', active: true },
      ]
    };

    // Color mapping
    const riskColors = {
      critical: '#ef4444',
      high: '#f59e0b',
      medium: '#3b82f6',
      low: '#10b981',
      safe: '#10b981'
    };

    const typeColors = {
      entry: '#ef4444',
      processing: '#3b82f6',
      storage: '#f59e0b',
      credential: '#ef4444',
      network: '#8b5cf6',
      external: '#ef4444',
      local: '#10b981',
      threat: '#dc2626',
      protection: '#10b981'
    };

    // Setup
    const width = window.innerWidth;
    const height = window.innerHeight - 80;
    let currentData = cloudData;

    const svg = d3.select('#graph-container')
      .append('svg')
      .attr('width', width)
      .attr('height', height);

    const g = svg.append('g');

    // Zoom behavior
    const zoom = d3.zoom()
      .scaleExtent([0.5, 3])
      .on('zoom', (event) => {
        g.attr('transform', event.transform);
      });

    svg.call(zoom);

    // Force simulation
    const simulation = d3.forceSimulation()
      .force('link', d3.forceLink().id(d => d.id).distance(150))
      .force('charge', d3.forceManyBody().strength(-800))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('collision', d3.forceCollide().radius(60));

    let link, linkLabel, node;

    function updateGraph(data) {
      currentData = data;

      // Update stats
      const stats = { critical: 0, high: 0, medium: 0, low: 0 };
      data.nodes.forEach(n => {
        if (stats[n.risk] !== undefined) stats[n.risk]++;
      });
      document.getElementById('stat-critical').textContent = stats.critical;
      document.getElementById('stat-high').textContent = stats.high;
      document.getElementById('stat-medium').textContent = stats.medium;
      document.getElementById('stat-low').textContent = stats.low;

      // Clear existing
      g.selectAll('*').remove();

      // Links
      link = g.append('g')
        .selectAll('path')
        .data(data.links)
        .join('path')
        .attr('class', d => d.active ? 'link active' : 'link')
        .attr('marker-end', 'url(#arrowhead)');

      // Link labels
      linkLabel = g.append('g')
        .selectAll('text')
        .data(data.links)
        .join('text')
        .attr('class', 'link-label')
        .text(d => d.label);

      // Nodes
      const nodeGroup = g.append('g')
        .selectAll('g')
        .data(data.nodes)
        .join('g')
        .attr('class', 'node')
        .call(d3.drag()
          .on('start', dragstarted)
          .on('drag', dragged)
          .on('end', dragended))
        .on('click', showDetails)
        .on('mouseenter', showTooltip)
        .on('mouseleave', hideTooltip);

      nodeGroup.append('circle')
        .attr('r', d => d.type === 'threat' ? 25 : 30)
        .attr('fill', d => `${typeColors[d.type]}33`)
        .attr('stroke', d => typeColors[d.type]);

      nodeGroup.append('text')
        .attr('dy', 45)
        .text(d => d.label);

      node = nodeGroup;

      // Arrow marker
      svg.append('defs').append('marker')
        .attr('id', 'arrowhead')
        .attr('viewBox', '-0 -5 10 10')
        .attr('refX', 35)
        .attr('refY', 0)
        .attr('orient', 'auto')
        .attr('markerWidth', 8)
        .attr('markerHeight', 8)
        .append('svg:path')
        .attr('d', 'M 0,-5 L 10 ,0 L 0,5')
        .attr('fill', '#3a3a45');

      simulation.nodes(data.nodes);
      simulation.force('link').links(data.links);
      simulation.alpha(1).restart();
    }

    simulation.on('tick', () => {
      if (link) {
        link.attr('d', d => {
          const dx = d.target.x - d.source.x;
          const dy = d.target.y - d.source.y;
          const dr = Math.sqrt(dx * dx + dy * dy);
          return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
        });
      }

      if (linkLabel) {
        linkLabel
          .attr('x', d => (d.source.x + d.target.x) / 2)
          .attr('y', d => (d.source.y + d.target.y) / 2);
      }

      if (node) {
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      }
    });

    function dragstarted(event, d) {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      d.fx = d.x;
      d.fy = d.y;
    }

    function dragged(event, d) {
      d.fx = event.x;
      d.fy = event.y;
    }

    function dragended(event, d) {
      if (!event.active) simulation.alphaTarget(0);
      d.fx = null;
      d.fy = null;
    }

    function showTooltip(event, d) {
      const tooltip = document.getElementById('tooltip');
      tooltip.innerHTML = `
        <div class="tooltip-title">${d.label}</div>
        <div class="tooltip-desc">${d.desc}</div>
        <span class="tooltip-risk ${d.risk}">${d.risk.toUpperCase()}</span>
      `;
      tooltip.style.left = (event.pageX + 15) + 'px';
      tooltip.style.top = (event.pageY + 15) + 'px';
      tooltip.classList.add('visible');
    }

    function hideTooltip() {
      document.getElementById('tooltip').classList.remove('visible');
    }

    function showDetails(event, d) {
      const panel = document.getElementById('detail-panel');
      const connections = currentData.links.filter(l => l.source.id === d.id || l.target.id === d.id);
      
      let html = `<button class="close-btn" onclick="hideDetails()" aria-label="Close details">×</button>`;
      html += `<div class="detail-title">${d.label}</div>`;
      html += `<div class="detail-content">`;
      html += `<p><strong>Type:</strong> ${d.type}</p>`;
      html += `<p><strong>Risk Level:</strong> <span class="tooltip-risk ${d.risk}">${d.risk.toUpperCase()}</span></p>`;
      html += `<p><strong>Description:</strong> ${d.desc}</p>`;
      
      if (connections.length > 0) {
        html += `<p><strong>Connections:</strong></p><ul>`;
        connections.forEach(c => {
          const other = c.source.id === d.id ? c.target : c.source;
          html += `<li>${c.label} → ${other.label}</li>`;
        });
        html += `</ul>`;
      }
      
      html += `</div>`;
      panel.innerHTML = html;
      panel.classList.add('visible');
      
      // Defensive check to ensure close button is present
      ensureCloseButton();
    }

    function hideDetails() {
      const panel = document.getElementById('detail-panel');
      panel.classList.remove('visible');
    }

    function ensureCloseButton() {
      const panel = document.getElementById('detail-panel');
      if (panel.classList.contains('visible') && !panel.querySelector('.close-btn')) {
        console.warn('Modal is visible but close button is missing - adding defensive close button');
        const closeBtn = document.createElement('button');
        closeBtn.className = 'close-btn';
        closeBtn.onclick = hideDetails;
        closeBtn.setAttribute('aria-label', 'Close details');
        closeBtn.textContent = '×';
        panel.insertBefore(closeBtn, panel.firstChild);
      }
    }

    // Toggle buttons
    document.getElementById('cloud-btn').addEventListener('click', () => {
      document.getElementById('cloud-btn').classList.add('active');
      document.getElementById('local-btn').classList.remove('active');
      updateGraph(cloudData);
    });

    document.getElementById('local-btn').addEventListener('click', () => {
      document.getElementById('local-btn').classList.add('active');
      document.getElementById('cloud-btn').classList.remove('active');
      updateGraph(localData);
    });

    // ESC key support for modal closing
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const panel = document.getElementById('detail-panel');
        if (panel.classList.contains('visible')) {
          e.preventDefault();
          e.stopPropagation();
          hideDetails();
        }
      }
    });

    // Initial render
    updateGraph(cloudData);

    // Handle window resize
    window.addEventListener('resize', () => {
      const newWidth = window.innerWidth;
      const newHeight = window.innerHeight - 80;
      svg.attr('width', newWidth).attr('height', newHeight);
      simulation.force('center', d3.forceCenter(newWidth / 2, newHeight / 2));
      simulation.alpha(0.3).restart();
    });
  </script>
</body>
</html>
